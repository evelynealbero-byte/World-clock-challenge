<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
    <h1>World Clock</h1>
    <select id="city">
        <option value="">Select a city...</option>
        <option value="current">My current location</option>
        <option value="America/New_York">New York</option>
        <option value="Europe/London">London</option>
        <option value="Asia/Tokyo">Tokyo</option>
    </select>
    <div id="cities">
    <div class ="city" id="los-angeles">
        <div>
        <h2>Los Angeles 🇺🇸</h2>
        <div class="date"> May 31st 2026</div>
        </div>
        <div class="time"> 1:00 <small>PM</small></div>
    </div>
     <div class ="city" id="alicante">
        <div>
        <h2>Alicante 🇪🇸 </h2>
        <div class="date"> May 31st 2026</div>
        </div>
        <div class="time"> 1:00 <small>PM</small></div>
    </div>
 </div>
</div>
    <footer>
      This project was coded  with 💜 <strong>by
      <a href="https://github.com/evelynealbero-byte" target="_blank"
        >Evelyne Albero</strong></a> and is open sourced on Github
      </footer>
   
   
    <script src="javascript/index.js"></script>
  </body>
</html>
