<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
    <h1>World Clock</h1>
    <select>
        <option value="">Select a city...</option>
        <option value="New York">New York</option>
        <option value="London">London</option>
        <option value="Tokyo">Tokyo</option>
    </select>
    <div class ="city">
        <h2>Los Angeles 🇺🇸</h2>
        <div class="time"> 1:00 PM</div>
        <div class="date"> May 31st 2026</div>
    </div>
     <div class ="city">
        <h2>Alicante 🇪🇸 </h2>
        <div class="time"> 1:00 <small>PM</small></div>
        <div class="date"> May 31st 2026</div>
    </div>

    <footer>
      This project was coded  with 💜 <strong>by
      <a href="https://github.com/evelynealbero-byte" target="_blank"
        >Evelyne Albero</strong> and is open sourced on Github</a
      >
      </footer>
    </div>
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
